<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Camera Test</title>
<style>
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;color:#fff;font-family:sans-serif;gap:16px;}
video{width:100%;max-width:400px;border-radius:12px;}
button{padding:16px 32px;font-size:16px;border-radius:12px;border:none;background:#6c63ff;color:#fff;cursor:pointer;}
#msg{font-size:14px;color:#ffd740;text-align:center;padding:0 20px;}
</style>
</head>
<body>
<div id="msg">กดปุ่มเพื่อทดสอบกล้อง</div>
<video id="v" autoplay playsinline muted></video>
<button id="btn">📷 เปิดกล้อง</button>
<script>
document.getElementById('btn').addEventListener('click', function() {
  document.getElementById('msg').textContent = 'กำลังขอสิทธิ์...';
  navigator.mediaDevices.getUserMedia({ video: { facingMode:'user' } })
    .then(function(stream) {
      document.getElementById('v').srcObject = stream;
      document.getElementById('msg').textContent = '✅ กล้องทำงานได้!';
      document.getElementById('btn').textContent = '✅ สำเร็จ';
    })
    .catch(function(e) {
      document.getElementById('msg').textContent = '❌ Error: ' + e.name + ' - ' + e.message;
    });
});
</script>
</body>
</html>
